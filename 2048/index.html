<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Pro - Animated & Undo</title>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
            --accent: #8f7a66;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #game-container {
            position: relative; width: 100%; max-width: 450px;
            display: flex; flex-direction: column; padding: 15px;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; background: var(--bg-color); z-index: 10;
        }
        .screen.active { display: flex; }

        canvas {
            background: var(--grid-bg); border-radius: 6px;
            width: 100%; height: auto; touch-action: none;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-bottom: 10px;
        }

        .controls {
            display: flex; justify-content: space-between; width: 100%; margin-top: 10px;
        }

        .score-box {
            background: var(--grid-bg); padding: 5px 15px; border-radius: 4px;
            color: white; text-align: center; min-width: 80px;
        }
        .score-label { font-size: 10px; font-weight: bold; }
        .score-value { font-size: 18px; font-weight: bold; }

        button {
            padding: 10px 20px; font-size: 16px; font-weight: bold;
            background: var(--accent); color: white; border: none;
            border-radius: 5px; cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        h1 { font-size: 60px; line-height: 0.8; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-title" class="screen active">
        <h1>2048</h1>
        <p style="margin-bottom:20px;">BEST: <span id="title-highscore">0</span></p>
        <button onclick="game.start()">START GAME</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="header">
            <h2 style="font-size: 32px;">2048</h2>
            <div style="display:flex; gap:5px;">
                <div class="score-box"><div class="score-label">SCORE</div><div id="current-score" class="score-value">0</div></div>
                <div class="score-box"><div class="score-label">BEST</div><div id="best-score" class="score-value">0</div></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <button id="undo-btn" onclick="game.undo()">UNDO</button>
            <button onclick="game.start()">RESET</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2 id="result-msg" style="font-size: 40px; margin-bottom: 10px;">GAME OVER</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="game.start()" style="margin-top:20px;">TRY AGAIN</button>
    </div>
</div>

<script>
const CONFIG = {
    gridSize: 4,
    tileSize: 100,
    gap: 12,
    animDuration: 120, // ミリ秒
    colors: {
        bg: '#bbada0', empty: '#cdc1b4',
        2: { bg: '#eee4da', text: '#776e65' },
        4: { bg: '#ede0c8', text: '#776e65' },
        8: { bg: '#f2b179', text: '#f9f6f2' },
        16: { bg: '#f59563', text: '#f9f6f2' },
        32: { bg: '#f67c5f', text: '#f9f6f2' },
        64: { bg: '#f65e3b', text: '#f9f6f2' },
        128: { bg: '#edcf72', text: '#f9f6f2' },
        256: { bg: '#edcc61', text: '#f9f6f2' },
        512: { bg: '#edc850', text: '#f9f6f2' },
        1024: { bg: '#edc53f', text: '#f9f6f2' },
        2048: { bg: '#edc22e', text: '#f9f6f2' }
    },
    ASSETS: {} 
};

class Tile {
    constructor(r, c, val) {
        this.r = r; this.c = c;
        this.prevR = r; this.prevC = c;
        this.val = val;
        this.isNew = true;
        this.mergedFrom = null; // 合成アニメーション用
    }
}

class Game2048 {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.grid = [];
        this.history = [];
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('2048-highscore-pro')) || 0;
        this.animStartTime = 0;
        this.isAnimating = false;

        this.initCanvas();
        this.setupInput();
        this.updateHighScoreUI();
    }

    initCanvas() {
        const size = CONFIG.gridSize * CONFIG.tileSize + (CONFIG.gridSize + 1) * CONFIG.gap;
        this.canvas.width = size;
        this.canvas.height = size;
    }

    start() {
        this.grid = Array(CONFIG.gridSize).fill().map(() => Array(CONFIG.gridSize).fill(null));
        this.history = [];
        this.score = 0;
        this.addRandomTile();
        this.addRandomTile();
        this.showScreen('screen-game');
        this.refresh();
    }

    addRandomTile() {
        const empty = [];
        for(let r=0; r<CONFIG.gridSize; r++) 
            for(let c=0; c<CONFIG.gridSize; c++) 
                if(!this.grid[r][c]) empty.push({r, c});
        
        if(empty.length > 0) {
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            this.grid[r][c] = new Tile(r, c, Math.random() < 0.9 ? 2 : 4);
        }
    }

    saveHistory() {
        const snapshot = {
            grid: this.grid.map(row => row.map(tile => tile ? {r: tile.r, c: tile.c, val: tile.val} : null)),
            score: this.score
        };
        this.history.push(JSON.stringify(snapshot));
        if(this.history.length > 10) this.history.shift(); // 過去10手まで
    }

    undo() {
        if(this.history.length === 0 || this.isAnimating) return;
        const last = JSON.parse(this.history.pop());
        this.score = last.score;
        this.grid = last.grid.map(row => row.map(t => t ? new Tile(t.r, t.c, t.val) : null));
        this.refresh();
    }

    move(dir) {
        if(this.isAnimating) return;
        this.saveHistory();
        
        let moved = false;
        const size = CONFIG.gridSize;
        const rotatedGrid = this.getRotatedGrid(dir);

        for(let r=0; r<size; r++) {
            let row = rotatedGrid[r].filter(tile => tile !== null);
            for(let i=0; i<row.length-1; i++) {
                if(row[i].val === row[i+1].val) {
                    const combined = new Tile(r, i, row[i].val * 2);
                    combined.mergedFrom = [row[i], row[i+1]];
                    combined.isNew = false;
                    row[i] = combined;
                    row.splice(i+1, 1);
                    this.score += combined.val;
                    moved = true;
                }
            }
            
            const newRow = Array(size).fill(null);
            row.forEach((tile, i) => {
                if(tile.c !== i || tile.mergedFrom) moved = true;
                tile.prevR = tile.r; tile.prevC = tile.c;
                tile.r = r; tile.c = i; // 回転後の座標
                newRow[i] = tile;
            });
            rotatedGrid[r] = newRow;
        }

        this.grid = this.restoreGrid(rotatedGrid, dir);

        if(moved) {
            this.isAnimating = true;
            this.animStartTime = performance.now();
            requestAnimationFrame((t) => this.animate(t));
        } else {
            this.history.pop();
        }
    }

    getRotatedGrid(dir) {
        let g = this.grid;
        for(let i=0; i<dir; i++) {
            const next = Array(4).fill().map(() => Array(4).fill(null));
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
                if(g[r][c]) { g[r][c].r = c; g[r][c].c = 3-r; }
                next[c][3-r] = g[r][c];
            }
            g = next;
        }
        return g;
    }

    restoreGrid(g, dir) {
        const reverseCount = (4 - dir) % 4;
        for(let i=0; i<reverseCount; i++) {
            const next = Array(4).fill().map(() => Array(4).fill(null));
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
                if(g[r][c]) { g[r][c].r = c; g[r][c].c = 3-r; }
                next[c][3-r] = g[r][c];
            }
            g = next;
        }
        return g;
    }

    animate(now) {
        const elapsed = now - this.animStartTime;
        const progress = Math.min(elapsed / CONFIG.animDuration, 1);

        this.draw(progress);

        if(progress < 1) {
            requestAnimationFrame((t) => this.animate(t));
        } else {
            this.isAnimating = false;
            this.grid.forEach(row => row.forEach(t => { if(t) { t.isNew = false; t.mergedFrom = null; }}));
            this.addRandomTile();
            this.refresh();
            this.checkStatus();
        }
    }

    draw(progress) {
        const { ctx, canvas } = this;
        ctx.fillStyle = CONFIG.colors.bg;
        ctx.beginPath();
        ctx.roundRect(0, 0, canvas.width, canvas.height, 6);
        ctx.fill();

        // 空の枠を描画
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
            this.drawTileRect(null, c, r);
        }

        // タイルの描画
        this.grid.forEach(row => row.forEach(tile => {
            if(!tile) return;
            if(tile.mergedFrom && progress < 1) {
                tile.mergedFrom.forEach(m => this.drawTile(m, progress));
            } else {
                this.drawTile(tile, progress);
            }
        }));
    }

    drawTile(tile, progress) {
        const ease = progress * progress; // 加速感
        const currentC = tile.prevC + (tile.c - tile.prevC) * ease;
        const currentR = tile.prevR + (tile.r - tile.prevR) * ease;
        
        let scale = 1;
        if(tile.isNew) scale = progress; // 出現
        if(tile.mergedFrom && progress > 0.5) scale = 1 + Math.sin((progress-0.5)*Math.PI)*0.15; // 合成時の弾み

        this.drawTileRect(tile.val, currentC, currentR, scale);
    }

    drawTileRect(val, c, r, scale = 1) {
        const { ctx } = this;
        const size = CONFIG.tileSize * scale;
        const x = CONFIG.gap + c * (CONFIG.tileSize + CONFIG.gap) + (CONFIG.tileSize - size)/2;
        const y = CONFIG.gap + r * (CONFIG.tileSize + CONFIG.gap) + (CONFIG.tileSize - size)/2;

        const style = val ? (CONFIG.colors[val] || {bg:'#3c3a32', text:'#fff'}) : {bg: CONFIG.colors.empty};
        
        ctx.fillStyle = style.bg;
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, 4);
        ctx.fill();

        if(val) {
            ctx.fillStyle = style.text;
            ctx.font = `bold ${Math.floor((val > 100 ? 32 : 40) * scale)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(val, x + size/2, y + size/2);
        }
    }

    refresh() {
        this.draw(1);
        document.getElementById('current-score').innerText = this.score;
        document.getElementById('undo-btn').disabled = this.history.length === 0;
        if(this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('2048-highscore-pro', this.highScore);
            this.updateHighScoreUI();
        }
    }

    updateHighScoreUI() {
        document.getElementById('best-score').innerText = this.highScore;
        document.getElementById('title-highscore').innerText = this.highScore;
    }

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    checkStatus() {
        let canMove = false;
        for(let r=0; r<4; r++) {
            for(let c=0; c<4; c++) {
                if(!this.grid[r][c]) canMove = true;
                else {
                    if(this.grid[r][c].val === 2048) { this.end("WIN!"); return; }
                    if(c<3 && this.grid[r][c+1] && this.grid[r][c].val === this.grid[r][c+1].val) canMove = true;
                    if(r<3 && this.grid[r+1][c] && this.grid[r][c].val === this.grid[r+1][c].val) canMove = true;
                }
            }
        }
        if(!canMove) this.end("GAME OVER");
    }

    setupInput() {
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') this.move(0);
            if(e.key === 'ArrowRight') this.move(1);
            if(e.key === 'ArrowDown') this.move(2);
            if(e.key === 'ArrowLeft') this.move(3);
        });

        let tsX, tsY;
        this.canvas.addEventListener('touchstart', e => { 
            tsX = e.touches[0].clientX; 
            tsY = e.touches[0].clientY; 
            e.preventDefault(); // スクロール等のデフォルト動作をここでしっかりブロック
        }, {passive: false});
        
        this.canvas.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tsX;
            const dy = e.changedTouches[0].clientY - tsY;
            
            // タップ（スワイプ量が少ない）場合は何もしない
            if(Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
                if(Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : 3);
                else this.move(dy > 0 ? 2 : 0);
            }
        });
    }
}

// polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        return this;
    };
}

const game = new Game2048();
</script>
</body>
</html>
