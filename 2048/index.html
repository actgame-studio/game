<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Pastel 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-dark: #646473;
            --text-light: #ffffff;
            --accent: #a1c4fd;
            --accent-shadow: #82a8ea;
            --btn-color: #ffd1ff;
            --btn-shadow: #e0b0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        
        body {
            font-family: 'Nunito', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-dark);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #game-container {
            position: relative; width: 100%; max-width: 450px;
            display: flex; flex-direction: column; padding: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
        }
        .screen.active { display: flex; }

        canvas {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            width: 100%; height: auto; touch-action: none;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
            padding: 8px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-bottom: 15px;
        }

        .controls {
            display: flex; justify-content: space-between; width: 100%; margin-top: 15px; gap: 10px;
        }

        .score-box {
            background: white; padding: 8px 15px; border-radius: 12px;
            color: var(--text-dark); text-align: center; min-width: 80px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #fff;
        }
        .score-label { font-size: 11px; font-weight: 900; letter-spacing: 1px; color: #a0a0b0; }
        .score-value { font-size: 20px; font-weight: 900; }

        button {
            flex: 1; padding: 12px 20px; font-size: 16px; font-weight: 900;
            background: var(--btn-color); color: var(--text-dark); border: none;
            border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 0 var(--btn-shadow), 0 10px 10px rgba(0,0,0,0.1);
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--btn-shadow), 0 2px 5px rgba(0,0,0,0.1);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: translateY(6px); box-shadow: 0 0 0; }
        
        button.primary { background: var(--accent); box-shadow: 0 6px 0 var(--accent-shadow), 0 10px 10px rgba(0,0,0,0.1); color: white; }
        button.primary:active:not(:disabled) { box-shadow: 0 0px 0 var(--accent-shadow), 0 2px 5px rgba(0,0,0,0.1); }

        h1 { font-size: 72px; line-height: 1; margin-bottom: 10px; color: var(--accent-shadow); text-shadow: 2px 2px 0 #fff; }
        h2 { font-size: 40px; color: var(--accent-shadow); text-shadow: 1px 1px 0 #fff; margin: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-title" class="screen active">
        <h1>2048</h1>
        <div class="score-box" style="margin-bottom: 30px;">
            <div class="score-label">BEST SCORE</div>
            <div id="title-highscore" class="score-value">0</div>
        </div>
        <button class="primary" onclick="game.start()" style="width: 80%; max-width: 250px;">Start Game</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="header">
            <h2>2048</h2>
            <div style="display:flex; gap:10px;">
                <div class="score-box"><div class="score-label">SCORE</div><div id="current-score" class="score-value">0</div></div>
                <div class="score-box"><div class="score-label">BEST</div><div id="best-score" class="score-value">0</div></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <button id="undo-btn" onclick="game.undo()">Undo</button>
            <button onclick="game.start()">Reset</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2 id="result-msg" style="font-size: 48px; margin-bottom: 10px; color: #ff9a9e;">Game Over</h2>
        <div class="score-box" style="margin-bottom: 30px; min-width: 150px;">
            <div class="score-label">FINAL SCORE</div>
            <div id="final-score" class="score-value">0</div>
        </div>
        <button class="primary" onclick="game.start()" style="width: 80%; max-width: 250px;">Try Again</button>
    </div>
</div>

<script>
const CONFIG = {
    gridSize: 4,
    tileSize: 100,
    gap: 12,
    animDuration: 120,
    // パステル＆おしゃれなカラーパレット
    colors: {
        bg: 'transparent', 
        empty: 'rgba(255, 255, 255, 0.4)', // 空きマスの色
        2:    { bg: '#ffe4e1', text: '#646473' }, // MistyRose
        4:    { bg: '#ffdab9', text: '#646473' }, // PeachPuff
        8:    { bg: '#ffb6c1', text: '#ffffff' }, // LightPink
        16:   { bg: '#ffc0cb', text: '#ffffff' }, // Pink
        32:   { bg: '#e6e6fa', text: '#646473' }, // Lavender
        64:   { bg: '#d8bfd8', text: '#ffffff' }, // Thistle
        128:  { bg: '#b0e0e6', text: '#646473' }, // PowderBlue
        256:  { bg: '#87cefa', text: '#ffffff' }, // LightSkyBlue
        512:  { bg: '#98fb98', text: '#646473' }, // PaleGreen
        1024: { bg: '#f0e68c', text: '#646473' }, // Khaki
        2048: { bg: '#ffd700', text: '#ffffff' }  // Gold
    }
};

class Tile {
    constructor(r, c, val) {
        this.r = r; this.c = c;
        this.prevR = r; this.prevC = c;
        this.val = val;
        this.isNew = true;
        this.mergedFrom = null; 
    }
}

class Game2048 {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.grid = [];
        this.history = [];
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('2048-highscore-pastel')) || 0;
        this.animStartTime = 0;
        this.isAnimating = false;

        this.initCanvas();
        this.setupInput();
        this.updateHighScoreUI();
    }

    initCanvas() {
        const size = CONFIG.gridSize * CONFIG.tileSize + (CONFIG.gridSize + 1) * CONFIG.gap;
        this.canvas.width = size;
        this.canvas.height = size;
    }

    start() {
        this.grid = Array(CONFIG.gridSize).fill().map(() => Array(CONFIG.gridSize).fill(null));
        this.history = [];
        this.score = 0;
        this.addRandomTile();
        this.addRandomTile();
        this.showScreen('screen-game');
        this.refresh();
    }

    addRandomTile() {
        const empty = [];
        for(let r=0; r<CONFIG.gridSize; r++) 
            for(let c=0; c<CONFIG.gridSize; c++) 
                if(!this.grid[r][c]) empty.push({r, c});
        
        if(empty.length > 0) {
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            this.grid[r][c] = new Tile(r, c, Math.random() < 0.9 ? 2 : 4);
        }
    }

    saveHistory() {
        const snapshot = {
            grid: this.grid.map(row => row.map(tile => tile ? {r: tile.r, c: tile.c, val: tile.val} : null)),
            score: this.score
        };
        this.history.push(JSON.stringify(snapshot));
        if(this.history.length > 10) this.history.shift(); 
    }

    undo() {
        if(this.history.length === 0 || this.isAnimating) return;
        const last = JSON.parse(this.history.pop());
        this.score = last.score;
        this.grid = last.grid.map(row => row.map(t => t ? new Tile(t.r, t.c, t.val) : null));
        this.refresh();
    }

    getVector(dir) {
        const map = { 0: { x: 0, y: -1 }, 1: { x: 1, y: 0 }, 2: { x: 0, y: 1 }, 3: { x: -1, y: 0 } };
        return map[dir];
    }

    buildTraversals(vector) {
        const traversals = { x: [], y: [] };
        for (let pos = 0; pos < CONFIG.gridSize; pos++) {
            traversals.x.push(pos);
            traversals.y.push(pos);
        }
        if (vector.x === 1) traversals.x.reverse();
        if (vector.y === 1) traversals.y.reverse();
        return traversals;
    }

    withinBounds(pos) {
        return pos.r >= 0 && pos.r < CONFIG.gridSize && pos.c >= 0 && pos.c < CONFIG.gridSize;
    }

    findFarthestPosition(cell, vector) {
        let previous;
        let current = { r: cell.r, c: cell.c };

        do {
            previous = current;
            current = { r: previous.r + vector.y, c: previous.c + vector.x };
        } while (this.withinBounds(current) && this.grid[current.r][current.c] === null);

        return { farthest: previous, next: current };
    }

    move(dir) {
        if (this.isAnimating) return;
        
        const vector = this.getVector(dir);
        const traversals = this.buildTraversals(vector);
        let moved = false;

        this.saveHistory();

        this.grid.forEach(row => {
            row.forEach(tile => {
                if (tile) {
                    tile.mergedFrom = null;
                    tile.isNew = false;
                    tile.prevR = tile.r;
                    tile.prevC = tile.c;
                }
            });
        });

        traversals.y.forEach(r => {
            traversals.x.forEach(c => {
                const tile = this.grid[r][c];

                if (tile) {
                    const positions = this.findFarthestPosition({ r, c }, vector);
                    const next = this.grid[positions.next.r]?.[positions.next.c];

                    if (next && next.val === tile.val && !next.mergedFrom) {
                        const mergedTile = new Tile(positions.next.r, positions.next.c, tile.val * 2);
                        mergedTile.mergedFrom = [tile, next];
                        mergedTile.isNew = false;
                        
                        this.grid[r][c] = null;
                        this.grid[positions.next.r][positions.next.c] = mergedTile;
                        tile.r = positions.next.r;
                        tile.c = positions.next.c;

                        this.score += mergedTile.val;
                        moved = true;
                    } else {
                        const { r: nextR, c: nextC } = positions.farthest;
                        if (r !== nextR || c !== nextC) {
                            this.grid[r][c] = null;
                            this.grid[nextR][nextC] = tile;
                            tile.r = nextR;
                            tile.c = nextC;
                            moved = true;
                        }
                    }
                }
            });
        });

        if (moved) {
            this.isAnimating = true;
            this.animStartTime = performance.now();
            requestAnimationFrame((t) => this.animate(t));
        } else {
            this.history.pop();
        }
    }

    animate(now) {
        const elapsed = now - this.animStartTime;
        const progress = Math.min(elapsed / CONFIG.animDuration, 1);

        this.draw(progress);

        if(progress < 1) {
            requestAnimationFrame((t) => this.animate(t));
        } else {
            this.isAnimating = false;
            this.grid.forEach(row => row.forEach(t => { if(t) { t.isNew = false; t.mergedFrom = null; }}));
            this.addRandomTile();
            this.refresh();
            this.checkStatus();
        }
    }

    draw(progress) {
        const { ctx, canvas } = this;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 空の枠を描画
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
            this.drawTileRect(null, c, r);
        }

        // タイルの描画
        this.grid.forEach(row => row.forEach(tile => {
            if(!tile) return;
            if(tile.mergedFrom && progress < 1) {
                tile.mergedFrom.forEach(m => this.drawTile(m, progress));
            } else {
                this.drawTile(tile, progress);
            }
        }));
    }

    drawTile(tile, progress) {
        const ease = progress * progress; 
        const currentC = tile.prevC + (tile.c - tile.prevC) * ease;
        const currentR = tile.prevR + (tile.r - tile.prevR) * ease;
        
        let scale = 1;
        if(tile.isNew) scale = progress; 
        if(tile.mergedFrom && progress > 0.5) scale = 1 + Math.sin((progress-0.5)*Math.PI)*0.2; 

        this.drawTileRect(tile.val, currentC, currentR, scale);
    }

    drawTileRect(val, c, r, scale = 1) {
        const { ctx } = this;
        const size = CONFIG.tileSize * scale;
        // 少しpaddingのようにはみ出さないように微調整
        const x = CONFIG.gap + c * (CONFIG.tileSize + CONFIG.gap) + (CONFIG.tileSize - size)/2;
        const y = CONFIG.gap + r * (CONFIG.tileSize + CONFIG.gap) + (CONFIG.tileSize - size)/2;
        const radius = 16; // 角丸を大きくして可愛く

        if (val === null) {
            // 空のマス
            ctx.fillStyle = CONFIG.colors.empty;
            ctx.beginPath();
            ctx.roundRect(x, y, size, size, radius);
            ctx.fill();
            return;
        }

        const style = CONFIG.colors[val] || {bg:'#ffd700', text:'#fff'};
        
        // 3Dの影（底面）部分を描画
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.beginPath();
        ctx.roundRect(x, y + 6 * scale, size, size, radius); // 下にズラして描画
        ctx.fill();

        // メインのパネルを描画
        ctx.fillStyle = style.bg;
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, radius);
        ctx.fill();

        // テキストの描画
        ctx.fillStyle = style.text;
        // 数字が大きい場合はフォントサイズを下げる
        let fontSize = 42;
        if (val >= 100) fontSize = 36;
        if (val >= 1000) fontSize = 28;
        
        ctx.font = `900 ${Math.floor(fontSize * scale)}px 'Nunito', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // y軸の中央位置は少し上寄り（影の分）に見えるので補正
        ctx.fillText(val, x + size/2, y + size/2 + 2);
    }

    refresh() {
        this.draw(1);
        document.getElementById('current-score').innerText = this.score;
        document.getElementById('undo-btn').disabled = this.history.length === 0;
        if(this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('2048-highscore-pastel', this.highScore);
            this.updateHighScoreUI();
        }
    }

    updateHighScoreUI() {
        document.getElementById('best-score').innerText = this.highScore;
        document.getElementById('title-highscore').innerText = this.highScore;
    }

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    checkStatus() {
        let canMove = false;
        for(let r=0; r<4; r++) {
            for(let c=0; c<4; c++) {
                if(!this.grid[r][c]) canMove = true;
                else {
                    if(this.grid[r][c].val === 2048) { this.end("You Win!"); return; }
                    if(c<3 && this.grid[r][c+1] && this.grid[r][c].val === this.grid[r][c+1].val) canMove = true;
                    if(r<3 && this.grid[r+1][c] && this.grid[r][c].val === this.grid[r+1][c].val) canMove = true;
                }
            }
        }
        if(!canMove) this.end("Game Over");
    }

    end(msg) {
        document.getElementById('result-msg').innerText = msg;
        // メッセージによって色を変える
        document.getElementById('result-msg').style.color = msg === "You Win!" ? "#ffd700" : "#ff9a9e";
        document.getElementById('final-score').innerText = this.score;
        setTimeout(() => this.showScreen('screen-result'), 500);
    }

    setupInput() {
        window.addEventListener('keydown', e => {
            if(['ArrowUp', 'ArrowRight', 'ArrowDown', 'ArrowLeft'].includes(e.key)) {
                e.preventDefault();
            }
            if(e.key === 'ArrowUp') this.move(0);
            if(e.key === 'ArrowRight') this.move(1);
            if(e.key === 'ArrowDown') this.move(2);
            if(e.key === 'ArrowLeft') this.move(3);
        });

        let tsX, tsY;
        this.canvas.addEventListener('touchstart', e => { 
            tsX = e.touches[0].clientX; 
            tsY = e.touches[0].clientY; 
            e.preventDefault(); 
        }, {passive: false});
        
        this.canvas.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tsX;
            const dy = e.changedTouches[0].clientY - tsY;
            
            if(Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
                if(Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : 3);
                else this.move(dy > 0 ? 2 : 0);
            }
        });
    }
}

// polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        return this;
    };
}

const game = new Game2048();
</script>
</body>
</html>
